<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Admin-Login | Monti Pfiffikus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-login-page">
  <div class="admin-login-card">
    <h1 class="admin-login-title">Admin-Bereich</h1>
    <p class="admin-login-subtitle">Monti Pfiffikus Kindertagespflege</p>

    <form id="admin-login-form" class="admin-login-form" action="admin.html" method="get" novalidate>
      <label for="admin-email">E-Mail</label>
      <input type="email" id="admin-email" name="email" autocomplete="email" required placeholder="admin@beispiel.de">

      <label for="admin-password">Passwort</label>
      <input type="password" id="admin-password" name="password" autocomplete="current-password" required placeholder="••••••••">

      <p id="admin-login-message" class="admin-login-message" role="alert" aria-live="polite" hidden></p>

      <button type="submit" class="btn admin-login-btn">Anmelden</button>
    </form>

    <p class="admin-login-hint">
      <strong>Hinweis:</strong> Die Anmeldung wird später über Firebase Authentication abgesichert.
      Bis dahin wird eine lokale Anmeldung zum Testen verwendet.
    </p>

    <a href="index.html" class="admin-login-back">← Zurück zur Website</a>
  </div>

  <script src="js/admin-auth.js"></script>
  <script>
    // Formular an Admin-Auth anbinden (später: Firebase)
    document.getElementById('admin-login-form').addEventListener('submit', window.adminAuth.handleLoginSubmit);
  </script>
</body>
</html>
